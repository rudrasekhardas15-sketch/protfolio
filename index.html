```html
<!DOCTYPE html>
<html>
<head>
<title>Rudra Sekhar Das Portfolio</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:#333;
text-align:center;
}

/* Navbar */

nav{
background:#111;
padding:15px;
position:sticky;
top:0;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-size:18px;
}

/* Header */

header{
padding:50px;
color:white;
}

/* Typing Animation */

.typing{
font-size:28px;
font-weight:bold;
border-right:3px solid white;
width:0;
overflow:hidden;
white-space:nowrap;
animation:typing 4s steps(30,end) forwards,blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:260px}
}

@keyframes blink{
50%{border-color:transparent}
}

/* Sections */

section{
background:white;
margin:30px auto;
padding:30px;
width:80%;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* Profile */

.profile img{
border-radius:50%;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* Project Cards */

.projects{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
background:#f4f4f4;
padding:15px;
border-radius:10px;
width:220px;
transition:0.3s;
}

.card:hover{
transform:scale(1.1);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* Button */

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#333;
color:white;
cursor:pointer;
}

button:hover{
background:#4facfe;
}

/* Form */

input,textarea{
width:60%;
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

<header id="home">
<h1>Rudra Sekhar Das</h1>
<div class="typing">AI/ML Student & Developer</div>
</header>

<section id="about" class="profile">

<h2>About Me</h2>

<img src="profile.jpg" width="160">

<p>BTech CSE AI/ML student interested in Machine Learning and Web Development.</p>

<button>Download My CV</button>
</a>

</section>

<section id="projects">

<h2>My Projects</h2>

<div class="projects">

<div class="card">
<img src="robot.jpg" width="200">
<p>Line Following Robot</p>
</div>

<div class="card">
<img src="mlproject.jpg" width="200">
<p>Machine Learning Project</p>
</div>

</div>

</section>

<section id="contact">

<h2>Contact Me</h2>

<form>

<textarea placeholder="Your Message"></textarea><br>
<button type="submit">Send</button>
</form>

<br>

<a href="https://github.com/">GitHub</a> |
<a href="https://linkedin.com/">LinkedIn</a>

</section>

</body>
</html>
